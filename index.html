<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blakeworth Compliance Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f1;
      color: #1b4332;
      min-height: 100vh;
    }
    header {
      background: #1b4332;
      color: white;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: 0.02em; }
    header .subtitle { font-size: 0.8rem; opacity: 0.6; margin-top: 2px; }
    #last-updated { font-size: 0.75rem; opacity: 0.5; }
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
      padding: 24px 32px 0;
    }
    .tile {
      background: white;
      border-radius: 10px;
      padding: 18px 20px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border-top: 4px solid transparent;
    }
    .tile.overdue   { border-top-color: #e53e3e; }
    .tile.due-soon  { border-top-color: #f6ad55; }
    .tile.upcoming  { border-top-color: #4299e1; }
    .tile.current   { border-top-color: #48bb78; }
    .tile.pending   { border-top-color: #a0aec0; }
    .tile.critical  { border-top-color: #1a202c; background: #fff5f5; }
    .tile .count { font-size: 2.4rem; font-weight: 700; line-height: 1; }
    .tile.overdue  .count { color: #e53e3e; }
    .tile.due-soon .count { color: #dd6b20; }
    .tile.upcoming .count { color: #3182ce; }
    .tile.current  .count { color: #2f855a; }
    .tile.pending  .count { color: #718096; }
    .tile.critical .count { color: #c53030; }
    .tile .label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #718096;
      margin-top: 6px;
    }
    .alert-banner {
      margin: 16px 32px 0;
      background: #fff5f5;
      border: 1px solid #fc8181;
      border-left: 4px solid #e53e3e;
      border-radius: 8px;
      padding: 14px 18px;
    }
    .alert-banner.hidden { display: none; }
    .alert-header {
      font-weight: 700;
      color: #c53030;
      font-size: 0.88rem;
      margin-bottom: 8px;
    }
    .alert-item {
      font-size: 0.82rem;
      color: #742a2a;
      padding: 3px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .alert-item a {
      color: #c53030;
      font-weight: 600;
      text-decoration: none;
      font-size: 0.78rem;
      border: 1px solid #fc8181;
      padding: 1px 8px;
      border-radius: 10px;
    }
    .alert-item a:hover { background: #e53e3e; color: white; }
    .cat-tabs {
      display: flex;
      gap: 8px;
      padding: 20px 32px 0;
      flex-wrap: wrap;
      align-items: center;
    }
    .cat-tab {
      padding: 6px 18px;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
      background: white;
      color: #4a5568;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .cat-tab:hover { background: #ebf4ee; border-color: #1b4332; color: #1b4332; }
    .cat-tab.active { background: #1b4332; color: white; border-color: #1b4332; font-weight: 600; }
    .controls {
      display: flex;
      gap: 12px;
      padding: 12px 32px 0;
      flex-wrap: wrap;
      align-items: center;
    }
    .controls select, .controls input {
      padding: 7px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 0.85rem;
      background: white;
      color: #1a1a2e;
      cursor: pointer;
    }
    .controls input { width: 220px; }
    .table-wrap {
      margin: 16px 32px 32px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    thead th {
      background: #1b4332;
      color: white;
      padding: 12px 14px;
      text-align: left;
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid #f0f2f5; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f7fafc; }
    td { padding: 11px 14px; vertical-align: middle; }
    tbody tr.row-forfeited { background: #fff5f5; }
    tbody tr.row-forfeited:hover { background: #fff0f0; }
    tbody tr.row-not-good { background: #fffaf0; }
    tbody tr.row-not-good:hover { background: #fff7e6; }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }
    .badge-overdue  { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
    .badge-due-soon { background: #fffaf0; color: #c05621; border: 1px solid #fbd38d; }
    .badge-upcoming { background: #ebf8ff; color: #2b6cb0; border: 1px solid #bee3f8; }
    .badge-current  { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
    .badge-pending  { background: #f7fafc; color: #4a5568; border: 1px solid #e2e8f0; }
    .comp-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }
    .comp-forfeited   { background: #1a202c; color: #fff; }
    .comp-not-good    { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
    .comp-payment-due { background: #fffaf0; color: #c05621; border: 1px solid #fbd38d; }
    .comp-good        { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
    .comp-extension   { background: #ebf8ff; color: #2b6cb0; border: 1px solid #bee3f8; }
    .comp-not-started { background: #f7fafc; color: #4a5568; border: 1px solid #e2e8f0; }
    .comp-unknown     { background: #f7fafc; color: #a0aec0; border: 1px solid #e2e8f0; }
    .action-link {
      display: inline-block;
      padding: 3px 10px;
      background: white;
      border: 1px solid #1b4332;
      border-radius: 5px;
      color: #1b4332;
      font-size: 0.75rem;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .action-link:hover { background: #1b4332; color: white; }
    .notes-cell { max-width: 40px; text-align: center; }
    .notes-icon {
      display: inline-block;
      width: 20px;
      height: 20px;
      background: #e2e8f0;
      border-radius: 50%;
      text-align: center;
      line-height: 20px;
      font-size: 0.72rem;
      color: #718096;
      cursor: help;
    }
    .notes-icon:hover { background: #1b4332; color: white; }
    .port {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .port-jhu     { background: #ebf8ff; color: #2b6cb0; }
    .port-slp     { background: #f0fff4; color: #276749; }
    .port-dc      { background: #faf5ff; color: #6b46c1; }
    .port-holding { background: #fffbeb; color: #92400e; }
    .state-msg {
      text-align: center;
      padding: 48px;
      color: #a0aec0;
      font-size: 0.9rem;
    }
    @media (max-width: 700px) {
      header, .summary, .cat-tabs, .controls, .table-wrap { padding-left: 16px; padding-right: 16px; }
      .table-wrap { margin-left: 16px; margin-right: 16px; }
      header h1 { font-size: 1.1rem; }
      td, th { padding: 9px 10px; }
      .alert-banner { margin-left: 16px; margin-right: 16px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Blakeworth Compliance Dashboard</h1>
    <div class="subtitle">JHU · SLP · DC — All portfolios</div>
  </div>
  <div id="last-updated">Loading&hellip;</div>
</header>

<div class="summary">
  <div class="tile critical">
    <div class="count" id="count-critical">&mdash;</div>
    <div class="label">&#9888; Action Needed</div>
  </div>
  <div class="tile overdue">
    <div class="count" id="count-overdue">&mdash;</div>
    <div class="label">Overdue</div>
  </div>
  <div class="tile due-soon">
    <div class="count" id="count-due-soon">&mdash;</div>
    <div class="label">Due Soon</div>
  </div>
  <div class="tile current">
    <div class="count" id="count-current">&mdash;</div>
    <div class="label">Current</div>
  </div>
  <div class="tile pending">
    <div class="count" id="count-pending">&mdash;</div>
    <div class="label">Pending</div>
  </div>
</div>

<div class="alert-banner hidden" id="alert-banner">
  <div class="alert-header">Immediate Action Required</div>
  <div id="alert-items"></div>
</div>

<div class="cat-tabs">
  <button class="cat-tab active" data-cat="">All Items</button>
  <button class="cat-tab" data-cat="LLC Filing">LLC Filings</button>
  <button class="cat-tab" data-cat="Property Tax">Property Tax</button>
  <button class="cat-tab" data-cat="Rental License">Rental Licenses</button>
  <button class="cat-tab" data-cat="Inspection">Inspections</button>
  <button class="cat-tab" data-cat="Insurance">Insurance</button>
  <button class="cat-tab" data-cat="Lead Paint">Lead Paint</button>
  <button class="cat-tab" data-cat="Registered Agent">Registered Agent</button>
</div>

<div class="controls">
  <select id="filter-portfolio">
    <option value="">All Portfolios</option>
    <option value="JHU">JHU</option>
    <option value="SLP">SLP</option>
    <option value="DC">DC</option>
    <option value="HOLDING">Holding</option>
  </select>
  <select id="filter-status">
    <option value="">All Statuses</option>
    <option value="Overdue">Overdue</option>
    <option value="Due Soon">Due Soon</option>
    <option value="Upcoming">Upcoming</option>
    <option value="Current">Current</option>
    <option value="Pending">Pending</option>
  </select>
  <input type="text" id="filter-search" placeholder="Search address or LLC&hellip;" />
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Portfolio</th>
        <th>Entity / Address</th>
        <th>Category</th>
        <th>Due Date</th>
        <th>Days</th>
        <th>Compliance Status</th>
        <th>Filing Status</th>
        <th>Action</th>
        <th title="Notes">i</th>
      </tr>
    </thead>
    <tbody id="table-body">
      <tr><td colspan="9" class="state-msg">Loading compliance data&hellip;</td></tr>
    </tbody>
  </table>
</div>

<script src="config.js"></script>
<script>

const COL = {
  ROW_ID:          0,
  PORTFOLIO:       1,
  ADDRESS:         2,
  UNIT:            3,
  LLC:             4,
  CATEGORY:        5,
  DUE_DATE:        6,
  DAYS_UNTIL:      7,
  STATUS:          8,
  STATUS_OVERRIDE: 9,
  RESPONSIBLE:     10,
  NOTES:           11,
};

const JHU_DEPT_IDS = {
  "Guilford GP, LLC":         "W23302540",
  "Woodrow Apartments, LLC":  "W25002825",
  "Calvert St, LLC":          "W22838031",
  "3119 N Calvert, LLC":      "W25002841",
  "University Pkwy, LLC":     "W24982449",
  "Woodrow GP, LLC":          "W25003013",
  "University GP, LLC":       "W24982431",
  "Guilford Apartments, LLC": "W23150261",
  "3106 N Calvert, LLC":      "W23764772",
  "Soteira Partners LLC":     "W24687469",
  "Abell St, LLC":            "W22347819",
  "Saint Paul St, LLC":       "W22812804",
  "3000 N Calvert St, LLC":   "W23712821"
};

function parseCompliance(notes, category, statusOverride) {
  if (category !== "LLC Filing") return null;
  const override = (statusOverride || "").trim();
  if (override === "Forfeited")
    return { label: "Forfeited", cls: "comp-forfeited", critical: true };
  if (override === "Not in Good Standing")
    return { label: "Not in Good Standing", cls: "comp-not-good", critical: true };
  if (override === "Ready for Payment")
    return { label: "Payment Due", cls: "comp-payment-due", critical: true };
  const n = (notes || "").toUpperCase();
  if (n.includes("FORFEITED") || n.includes("REINSTATEMENT"))
    return { label: "Forfeited", cls: "comp-forfeited", critical: true };
  if (n.includes("NOT IN GOOD STANDING"))
    return { label: "Not in Good Standing", cls: "comp-not-good", critical: true };
  if (n.includes("READY FOR PAYMENT"))
    return { label: "Payment Due", cls: "comp-payment-due", critical: true };
  if (n.includes("EXTENSION FILED") || n.includes("EXTENSION"))
    return { label: "Extension Filed", cls: "comp-extension", critical: false };
  if (n.includes("IN GOOD STANDING") || n.includes("SUBMITTED") || n.includes("FILED"))
    return { label: "In Good Standing", cls: "comp-good", critical: false };
  if (n.includes("NOT STARTED"))
    return { label: "Not Filed", cls: "comp-not-started", critical: false };
  return null;
}

function actionLink(row) {
  const category = (row[COL.CATEGORY] || "").trim();
  const llc      = (row[COL.LLC]      || "").trim();
  if (category === "LLC Filing") {
    const deptId = JHU_DEPT_IDS[llc];
    const url = deptId
      ? "https://egov.maryland.gov/businessexpress/entitysearch/search?searchType=1&searchValue=" + deptId
      : "https://egov.maryland.gov/businessexpress/";
    return '<a href="' + url + '" target="_blank" class="action-link">SDAT &rarr;</a>';
  }
  if (category === "Property Tax")
    return '<a href="https://sdat.dat.maryland.gov/RealProperty/" target="_blank" class="action-link">View &rarr;</a>';
  if (category === "Rental License")
    return '<a href="https://dhcd.baltimorecity.gov/" target="_blank" class="action-link">View &rarr;</a>';
  return '<span style="color:#a0aec0;font-size:0.78rem;">&mdash;</span>';
}

function badgeClass(status) {
  return { "Overdue": "badge-overdue", "Due Soon": "badge-due-soon",
           "Upcoming": "badge-upcoming", "Current": "badge-current",
           "Pending": "badge-pending" }[status] || "badge-pending";
}

function portClass(p) {
  return { JHU: "port-jhu", SLP: "port-slp", DC: "port-dc", HOLDING: "port-holding" }[p] || "";
}

function formatDate(raw) {
  if (!raw) return "&mdash;";
  const d = new Date(raw);
  if (isNaN(d)) return raw;
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}

function truncNotes(notes) {
  if (!notes) return "";
  const clean = notes.replace(/\|/g, " ").trim();
  return clean.length > 120 ? clean.slice(0, 117) + "..." : clean;
}

function parseCSV(text) {
  const rows = [];
  const lines = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
  for (const line of lines) {
    if (!line.trim()) continue;
    const row = [];
    let current = "", inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
        else { inQuotes = !inQuotes; }
      } else if (ch === "," && !inQuotes) {
        row.push(current); current = "";
      } else {
        current += ch;
      }
    }
    row.push(current);
    rows.push(row);
  }
  return rows;
}

let activeCat = "";
let allRows   = [];

function render() {
  const filterPort   = document.getElementById("filter-portfolio").value;
  const filterStatus = document.getElementById("filter-status").value;
  const filterSearch = document.getElementById("filter-search").value.toLowerCase();

  const filtered = allRows.filter(function(row) {
    const portfolio = (row[COL.PORTFOLIO] || "").trim();
    const status    = (row[COL.STATUS]    || "").trim();
    const category  = (row[COL.CATEGORY]  || "").trim();
    const address   = (row[COL.ADDRESS]   || "").toLowerCase();
    const llc       = (row[COL.LLC]       || "").toLowerCase();
    if (activeCat    && category  !== activeCat)   return false;
    if (filterPort   && portfolio !== filterPort)   return false;
    if (filterStatus && status    !== filterStatus) return false;
    if (filterSearch && !address.includes(filterSearch) && !llc.includes(filterSearch)) return false;
    return true;
  });

  const counts = { Overdue: 0, "Due Soon": 0, Upcoming: 0, Current: 0, Pending: 0, critical: 0 };
  allRows.forEach(function(row) {
    const s = (row[COL.STATUS] || "").trim();
    if (s in counts) counts[s]++;
    const comp = parseCompliance(row[COL.NOTES], (row[COL.CATEGORY] || "").trim(), row[COL.STATUS_OVERRIDE]);
    if (comp && comp.critical) counts.critical++;
  });
  document.getElementById("count-critical").textContent  = counts.critical;
  document.getElementById("count-overdue").textContent   = counts["Overdue"];
  document.getElementById("count-due-soon").textContent  = counts["Due Soon"];
  document.getElementById("count-current").textContent   = counts["Current"];
  document.getElementById("count-pending").textContent   = counts["Pending"];

  const criticalRows = allRows.filter(function(row) {
    const comp = parseCompliance(row[COL.NOTES], (row[COL.CATEGORY] || "").trim(), row[COL.STATUS_OVERRIDE]);
    return comp && comp.critical;
  });
  const banner = document.getElementById("alert-banner");
  if (criticalRows.length === 0) {
    banner.classList.add("hidden");
  } else {
    banner.classList.remove("hidden");
    document.getElementById("alert-items").innerHTML = criticalRows.map(function(row) {
      const llc  = (row[COL.LLC] || "").trim();
      const comp = parseCompliance(row[COL.NOTES], (row[COL.CATEGORY] || "").trim(), row[COL.STATUS_OVERRIDE]);
      const deptId = JHU_DEPT_IDS[llc];
      const url = deptId
        ? "https://egov.maryland.gov/businessexpress/entitysearch/search?searchType=1&searchValue=" + deptId
        : "https://egov.maryland.gov/businessexpress/";
      return '<div class="alert-item">'
        + '<span class="comp-badge ' + comp.cls + '" style="font-size:0.68rem;padding:2px 7px">' + comp.label + '</span>'
        + '<strong>' + llc + '</strong>'
        + '<a href="' + url + '" target="_blank">View on SDAT &rarr;</a>'
        + '</div>';
    }).join("");
  }

  const timePriority = { "Overdue": 0, "Due Soon": 1, "Upcoming": 2, "Current": 3, "Pending": 4 };
  const compPriority = { "comp-forfeited": 0, "comp-not-good": 1, "comp-payment-due": 2 };
  filtered.sort(function(a, b) {
    const ca = parseCompliance(a[COL.NOTES], (a[COL.CATEGORY] || "").trim(), a[COL.STATUS_OVERRIDE]);
    const cb = parseCompliance(b[COL.NOTES], (b[COL.CATEGORY] || "").trim(), b[COL.STATUS_OVERRIDE]);
    const critA = ca && ca.critical ? 0 : 1;
    const critB = cb && cb.critical ? 0 : 1;
    if (critA !== critB) return critA - critB;
    if (critA === 0 && critB === 0) {
      const pA = compPriority[ca.cls] !== undefined ? compPriority[ca.cls] : 9;
      const pB = compPriority[cb.cls] !== undefined ? compPriority[cb.cls] : 9;
      if (pA !== pB) return pA - pB;
    }
    const sa = timePriority[(a[COL.STATUS] || "").trim()] !== undefined ? timePriority[(a[COL.STATUS] || "").trim()] : 5;
    const sb = timePriority[(b[COL.STATUS] || "").trim()] !== undefined ? timePriority[(b[COL.STATUS] || "").trim()] : 5;
    return sa - sb;
  });

  if (filtered.length === 0) {
    document.getElementById("table-body").innerHTML =
      '<tr><td colspan="9" class="state-msg">No items match the current filters.</td></tr>';
    return;
  }

  document.getElementById("table-body").innerHTML = filtered.map(function(row) {
    const status    = (row[COL.STATUS]    || "Pending").trim();
    const portfolio = (row[COL.PORTFOLIO] || "").trim();
    const category  = (row[COL.CATEGORY]  || "").trim();
    const notes     = (row[COL.NOTES]     || "");
    const override  =  row[COL.STATUS_OVERRIDE] || "";
    const daysRaw   =  row[COL.DAYS_UNTIL];
    const days      = (daysRaw === "&mdash;" || daysRaw === "") ? "&mdash;" : Number(daysRaw);
    let daysDisplay;
    if (typeof days === "number") {
      if (days < 0)    daysDisplay = '<span style="color:#e53e3e;font-weight:700">' + days + 'd</span>';
      else if (days <= 30) daysDisplay = '<span style="color:#dd6b20;font-weight:600">' + days + 'd</span>';
      else             daysDisplay = days + 'd';
    } else {
      daysDisplay = "&mdash;";
    }

    const comp = parseCompliance(notes, category, override);
    const compBadge = comp
      ? '<span class="comp-badge ' + comp.cls + '">' + comp.label + '</span>'
      : '<span style="color:#a0aec0;font-size:0.78rem">&mdash;</span>';

    const entityDisplay = (row[COL.LLC] || row[COL.ADDRESS] || "&mdash;");
    let addrSub = "";
    if (row[COL.LLC] && row[COL.ADDRESS]) {
      addrSub = '<div style="font-size:0.73rem;color:#718096;margin-top:2px">'
        + row[COL.ADDRESS]
        + (row[COL.UNIT] ? " &middot; Unit " + row[COL.UNIT] : "")
        + '</div>';
    }

    const rowClass = comp
      ? (comp.cls === "comp-forfeited" ? "row-forfeited"
       : comp.cls === "comp-not-good"  ? "row-not-good" : "")
      : "";

    const shortNote = truncNotes(notes);
    const notesCell = shortNote
      ? '<span class="notes-icon" title="' + shortNote.replace(/"/g, "&quot;") + '">i</span>'
      : '<span style="color:#e2e8f0">&mdash;</span>';

    return '<tr class="' + rowClass + '">'
      + '<td><span class="port ' + portClass(portfolio) + '">' + portfolio + '</span></td>'
      + '<td>'
      + '<div style="font-size:0.83rem;font-weight:500;color:#1b4332">' + entityDisplay + '</div>'
      + addrSub
      + '</td>'
      + '<td style="font-size:0.8rem;color:#4a5568;white-space:nowrap">' + category + '</td>'
      + '<td style="white-space:nowrap;font-size:0.82rem">' + formatDate(row[COL.DUE_DATE]) + '</td>'
      + '<td style="text-align:center;font-size:0.82rem">' + daysDisplay + '</td>'
      + '<td>' + compBadge + '</td>'
      + '<td><span class="badge ' + badgeClass(status) + '">' + status + '</span></td>'
      + '<td>' + actionLink(row) + '</td>'
      + '<td class="notes-cell">' + notesCell + '</td>'
      + '</tr>';
  }).join("");
}

async function fetchData() {
  try {
    const res = await fetch(CONFIG.MASTER_CSV_URL);
    if (!res.ok) throw new Error("Fetch error: " + res.status);
    const text = await res.text();
    return parseCSV(text).slice(1);
  } catch (err) {
    document.getElementById("table-body").innerHTML =
      '<tr><td colspan="9" class="state-msg">Could not load data.<br><small>' + err.message + '</small></td></tr>';
    return [];
  }
}

async function init() {
  allRows = await fetchData();
  render();
  document.getElementById("last-updated").textContent =
    "Last updated: " + new Date().toLocaleString("en-US", { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
  setInterval(async function() {
    allRows = await fetchData();
    render();
    document.getElementById("last-updated").textContent =
      "Last updated: " + new Date().toLocaleString("en-US", { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
  }, 300000);
}

document.querySelectorAll(".cat-tab").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".cat-tab").forEach(function(b) { b.classList.remove("active"); });
    btn.classList.add("active");
    activeCat = btn.dataset.cat;
    render();
  });
});

["filter-portfolio", "filter-status", "filter-search"]
  .forEach(function(id) { document.getElementById(id).addEventListener("input", render); });

init();
</script>
</body>
</html>
